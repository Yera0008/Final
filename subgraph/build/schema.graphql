type Market @entity {
  id: ID!
  question: String!
  oracleFeed: Bytes!
  resolutionPrice: BigInt!
  resolutionTime: BigInt!
  state: String!
  outcome: String!
  createdAt: BigInt!
  totalCollateral: BigInt!
}

type Trade @entity {
  id: ID!
  market: Market!
  buyer: Bytes!
  isYes: Boolean!
  amountIn: BigInt!
  amountOut: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
}

type LiquidityEvent @entity {
  id: ID!
  market: Market!
  provider: Bytes!
  shares: BigInt!
  type: String!
  timestamp: BigInt!
}

type Redemption @entity {
  id: ID!
  market: Market!
  user: Bytes!
  payout: BigInt!
  timestamp: BigInt!
}

type MarketStats @entity {
  id: ID!
  market: Market!
  totalTrades: BigInt!
  totalVolumeIn: BigInt!
  totalFeesCollected: BigInt!
  uniqueTraders: BigInt!
  lastUpdated: BigInt!
}