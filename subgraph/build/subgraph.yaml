specVersion: 0.0.5
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: PredictionMarket
    network: arbitrum-sepolia
    source:
      address: "0x8bE287Cddb210165a7F47Fc84a04Ccc26E9a335A"
      abi: PredictionMarket
      startBlock: 269077716
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - Trade
        - LiquidityEvent
        - Redemption
        - MarketStats
      abis:
        - name: PredictionMarket
          file: PredictionMarket\PredictionMarket.json
      eventHandlers:
        - event: MarketCreated(indexed uint256,string,address,uint256)
          handler: handleMarketCreated
        - event: OutcomeBought(indexed uint256,indexed address,bool,uint256,uint256)
          handler: handleOutcomeBought
        - event: LiquidityAdded(indexed uint256,indexed address,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed uint256,indexed address,uint256)
          handler: handleLiquidityRemoved
        - event: MarketResolved(indexed uint256,uint8)
          handler: handleMarketResolved
        - event: Redeemed(indexed uint256,indexed address,uint256)
          handler: handleRedeemed
      file: PredictionMarket\PredictionMarket.wasm
